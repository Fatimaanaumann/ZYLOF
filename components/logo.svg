<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="zyloGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" /> <stop offset="50%" stop-color="#7C3AED" /> <stop offset="100%" stop-color="#06B6D4" /> </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#0B0F19" rx="30" />

  <g filter="url(#glow)">
    <path d="M 250,250 
             L 550,250 
             A 25,25 0 0,1 571,288
             L 246,522 
             A 25,25 0 0,0 250,550
             L 550,550" 
          fill="none" 
          stroke="url(#zyloGradient)" 
          stroke-width="45" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <g fill="url(#zyloGradient)">
      <rect x="360" y="370" width="20" height="60" rx="10" />
      <rect x="400" y="340" width="20" height="120" rx="10" />
      <rect x="440" y="360" width="20" height="80" rx="10" />
    </g>
  </g>
</svg>
